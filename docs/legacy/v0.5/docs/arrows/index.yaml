# docs/arrows/index.yaml — segment registry for the spec graph
#
# Each entry is a product-behavior segment owned by one LLD.
# The prefix marks the segment boundary in @spec annotations.
#
# Status values:
#   PROPOSED  — segment exists in HLD/LLD but no specs/code yet
#   MAPPED    — specs exist; code/tests being added
#   AUDITED   — full coherence audit passed; graph is clean
#   DRIFT     — coherence audit failed; see drift field for details

