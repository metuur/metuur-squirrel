# .agents/uncle-dev-setup.yaml
# Uncle Dev project configuration — generated by /uncle-dev-setup
#
# This file is the single source of truth for how uncle-dev behaves in this project.
# Edit it to enable/disable hooks, declare companion skills, and set preferences.
#
# After editing:
#   - Hook toggles: re-run /uncle-dev-setup to sync changes into .claude/settings.json
#   - Companion skills: reference them by path when prompting (/uncle-dev-build, /uncle-dev-review)
#   - Preferences: agents read this file at the start of each session

version: "1.0.0"

# ── Project metadata ──────────────────────────────────────────────────────────
# Inferred from directory name on first run. Edit to match your project.
project:
  name: "squirrel"
  setup_date: "2026-05-27"
  type: "web-app"       # web-app | api | mobile | library | cli | monorepo
  language: ""          # typescript | javascript | python | go | rust | etc.
  framework: ""         # react | nextjs | express | fastapi | etc. (blank if none)

# ── Tool configuration ────────────────────────────────────────────────────────
# Populated automatically by /uncle-dev-setup based on detected tools.
# Do not edit manually unless you know a tool was missed during detection.
tool:
  # Tools detected and configured during setup.
  # Valid values: claude-code | codex | opencode
  active: [claude-code,codex,opencode]

  # Absolute path to the cloned uncle-dev agent-skills repository.
  # Used to re-run install scripts and to locate hooks.
  # Leave blank if installed exclusively via marketplace.
  agent_skills_root: "/Users/javierbenavides/.claude/plugins/cache/uncle-dev-agent-skills/uncle-dev-agent-skills/1.0.0"

# ── Skill configuration ───────────────────────────────────────────────────────
# All uncle-dev skills are always available — there is no opt-in/opt-out list.
skills:

  # Per-skill overrides for project-specific behaviour.
  # Only specify settings that differ from the skill's own defaults.
  overrides:
    uncle-dev-test-driven-development:
      test_runner: ""          # vitest | jest | pytest | go-test (blank = auto-detect)
      coverage_threshold: 80

  # Companion skills — EXTERNAL skills not included in uncle-dev.
  # Loaded alongside uncle-dev for a given phase. Use for project-specific or
  # third-party skills your team has authored.
  #
  # Format:
  #   <phase>:
  #     - path: <relative path to SKILL.md from project root>
  #       name: <short name used in prompts>
  #
  # Supported phases: define | plan | build | verify | review | ship | capture | maintain
  #
  # Example:
  #   build:
  #     - path: .agents/skills/my-design-system/SKILL.md
  #       name: my-design-system
  #   ship:
  #     - path: .agents/skills/openapi-doc-generator/SKILL.md
  #       name: openapi-doc-generator
  companions: {}

# ── Workflow preferences ──────────────────────────────────────────────────────
preferences:
  sdd_required: true          # require /uncle-dev-spec (OpenSpec artifact) before coding
  sdd_mode: "lid-ears"        # openspec | lid-ears
                              #   openspec  → scaffold OpenSpec change first, EARS near end (default)
                              #   lid-ears  → elicit requirements via LID EARS first, OpenSpec tracks them after
  spec_annotations: true      # require @spec IDs linking code to specs
  graphify: false             # set true after running: graphify . (creates graphify-out/)
  knowledge_capture: true     # enable post-test nudge to run /uncle-dev-knowledge-capture
  destructive_guard: true     # block dangerous git/db commands via hook

# ── Hook toggles ─────────────────────────────────────────────────────────────
# All hooks default to on. Set to false to disable a specific guard.
# After changing toggles, re-run /uncle-dev-setup to sync into .claude/settings.json.
hooks:
  session_start: true            # injects Skill Discovery flowchart on every session start
  pre_commit: true               # validates commit message quality and scans for debug artifacts
  spec_coherence: true           # blocks edits/commits that cite undefined @spec IDs
  openspec_guard: true           # validates OpenSpec change artifact structure on write
  destructive_command_guard: true  # warns before destructive git/db shell commands
  knowledge_capture_nudge: true  # nudges to capture learnings after test/build success

# ── OpenSpec conventions ──────────────────────────────────────────────────────
openspec:
  change_id_format: "NNN-slug"   # e.g. 001-user-auth, 042-payment-refactor
  required_artifacts:
    - proposal.md
    - design.md
    - tasks.md
    - execution.md
    - handoff.md
