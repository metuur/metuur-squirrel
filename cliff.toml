# git-cliff configuration for Squirrel
# Produces a surface-grouped MECHANICAL draft of the changelog from conventional
# commits. This is raw material for the `squirrel:changelog` skill — its lines
# still read like commits; the skill reframes them into user-facing voice.
#
# Usage:
#   git-cliff --unreleased --tag v0.7.27      # draft the next release
#   git-cliff --output CHANGELOG.draft.md     # full history draft
#
# Install: brew install git-cliff  (or cargo install git-cliff)

[changelog]
header = """
# Changelog

All notable, user-facing changes to Squirrel are documented here.
Format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/);
versions follow [Semantic Versioning](https://semver.org/).
\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | split(pat=":") | last | trim | upper_first }}
{% endfor %}\
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
protect_breaking_commits = true
filter_commits = true          # drop anything no parser groups
tag_pattern = "v[0-9]*"
sort_commits = "newest"

# Parsers run top-to-bottom; first match wins. Noise is skipped first, then
# surviving commits are grouped by SURFACE via their scope. The numeric
# <!-- N --> prefixes only control group ordering and are stripped on render.
commit_parsers = [
  # --- noise: drop entirely -------------------------------------------------
  { message = "(?i)graphify", skip = true },
  { message = "(?i)^refactor", skip = true },
  { message = "(?i)^chore", skip = true },
  { message = "(?i)^test", skip = true },
  { message = "(?i)^ci", skip = true },
  { message = "(?i)^build", skip = true },
  { message = "(?i)^docs", skip = true },
  { message = "(?i)version to|bump to|bump version", skip = true },

  # --- surface grouping (scope-driven) -------------------------------------
  { message = "\\((cli|installer|build-pkg|migrate-vault)\\)", group = "<!-- 0 -->⌨️  CLI" },
  { message = "\\((desktop|tray|notif-branding|reminder-daemon)\\)", group = "<!-- 1 -->🖥  Desktop app" },
  { message = "\\((web-ui|backend|guide)\\)", group = "<!-- 2 -->🌐  Web UI" },
  { message = "\\((onboarding|projects)\\)", group = "<!-- 3 -->✨  General" },

  # unscoped feat/fix → General; everything else already skipped above
  { message = "(?i)^feat", group = "<!-- 3 -->✨  General" },
  { message = "(?i)^fix", group = "<!-- 3 -->✨  General" },
]
